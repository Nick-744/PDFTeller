<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Reset */
        *{box-sizing:border-box;margin:0;padding:0}

        /* Global theme colors */
        :root{--bg:#1d0f0f;--text:#97785a;--muted:rgba(151,120,90,0.75);--accent:var(--text)}

        @font-face{font-family:'OpenDyslexic3';src:url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/fonts/OpenDyslexic3-Regular.ttf') format('truetype')}

        html,body{height:100%}
        body{
            font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial;
            background:var(--bg);
            color:var(--text);
            -webkit-font-smoothing:antialiased;
            display:flex;align-items:center;justify-content:center;padding:12px;
            min-height:-webkit-fill-available
        }

        .container{width:100%;max-width:880px;border-radius:14px;padding:18px;background:transparent}
        h1{text-align:center;margin-bottom:14px;font-size:1.6rem;color:var(--text)}

        /* Upload area */
        .upload-area{border:2px dashed var(--muted);border-radius:10px;padding:26px 18px;text-align:center;margin-bottom:16px;cursor:pointer}
        .upload-area.dragover{background:rgba(255,255,255,0.02);border-color:var(--text)}
        .upload-label{font-size:1.05rem;color:var(--text);display:block;margin-bottom:8px}
        .upload-hint{color:var(--muted);font-size:.9rem}

        /* Controls */
        .controls{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
        .control-row{display:flex;gap:10px}
        button{background:var(--text);color:var(--bg);border:none;padding:10px;border-radius:8px;cursor:pointer;flex:1}
        button:disabled{opacity:.6;cursor:not-allowed}
        .font-toggle-btn{flex:unset;padding:8px 12px}
        .font-toggle-btn.active{outline:2px solid rgba(151,120,90,0.18)}

        .rate-control{display:flex;align-items:center;gap:10px;background:transparent;padding:6px;border-radius:8px}
        .rate-control label{color:var(--text);font-weight:600}
        input[type=range]{flex:1;height:6px;background:rgba(151,120,90,0.12);border-radius:6px}
        input[type=range]::-webkit-slider-thumb{width:16px;height:16px;border-radius:50%;background:var(--text);border:0}
        .rate-value{color:var(--text);font-weight:700;min-width:48px;text-align:center}

        /* Text display */
        .text-display{background:rgba(255,255,255,0.02);border-radius:10px;padding:18px;min-height:140px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;overflow:auto}
        .current-sentence{font-size:1.15rem;line-height:1.6;text-align:center;color:var(--text);padding:6px}
        .sentence-number{display:block;color:var(--muted);font-size:.85rem;margin-bottom:8px}

        .status{text-align:center;margin-top:6px;color:var(--muted);font-size:.98rem}
        .progress-bar{width:100%;height:6px;background:rgba(151,120,90,0.08);border-radius:6px;margin-top:8px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--text),rgba(151,120,90,0.85));width:0;transition:width .25s ease}

        .upload-section.hidden{display:none}
        .reader-section{display:flex;flex-direction:column}

        .file-info{padding:8px 10px;border-radius:8px;margin-bottom:8px;color:var(--muted);text-align:center}
        .file-info span{color:var(--text);font-weight:700}

        /* Dyslexic mode */
        body.dyslexic-font .current-sentence{font-family:'OpenDyslexic3','OpenDyslexic',sans-serif !important;letter-spacing:.06em}

        @media (max-width:768px){
            .container{padding:14px;border-radius:8px}
            h1{font-size:1.25rem}
            .upload-area{padding:22px}
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📖 PDF to Speech Reader</h1>
        
        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".pdf">
                <label for="fileInput" class="upload-label">Choose PDF or drag & drop</label>
                <span class="upload-hint">Upload a PDF file to start text-to-speech</span>
            </div>
        </div>

        <div class="reader-section" id="readerSection">
            <div class="file-info" id="fileInfo">
                <div>📄 <span id="fileName"></span> • <span id="sentenceCount"></span> sentences</div>
            </div>

            <div class="controls active" id="controls">
                <div class="control-row">
                    <button id="pauseBtn">⏸️ Pause</button>
                    <button id="fontToggleBtn" class="font-toggle-btn" title="Toggle Dyslexic Font">🔤</button>
                </div>
                <div class="rate-control">
                    <label>Speed:</label>
                    <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1.2">
                    <span class="rate-value" id="rateValue">1.2x</span>
                </div>
            </div>

            <div class="text-display active" id="textDisplay">
                <div class="current-sentence">
                    <span class="sentence-number">Ready to start</span>
                    Click Play to begin reading
                </div>
            </div>

            <div class="status" id="status">
                <div id="statusText">Ready to play</div>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Global variables
        let processedText = [];
        let currentIndex = 0;
        let isPlaying = false;
        let isPaused = false;
        let speechUtterance = null;
        let currentFileName = '';

        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const uploadSection = document.getElementById('uploadSection');
        const readerSection = document.getElementById('readerSection');
        const textDisplay = document.getElementById('textDisplay');
        const pauseBtn = document.getElementById('pauseBtn');
        const rateSlider = document.getElementById('rateSlider');
        const rateValue = document.getElementById('rateValue');
        const statusText = document.getElementById('statusText');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const fileName = document.getElementById('fileName');
        const sentenceCount = document.getElementById('sentenceCount');
        const fontToggleBtn = document.getElementById('fontToggleBtn');

        // Process PDF text with structure (translation of Python function)
        async function processPdfTextWithStructure(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const processedTextArray = [];

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const textContent = await page.getTextContent();
                
                // Get text items from the page
                const lines = [];
                let currentLine = '';
                let lastY = null;

                textContent.items.forEach((item) => {
                    // Check if we're on a new line (Y position changed significantly)
                    if (lastY !== null && Math.abs(item.transform[5] - lastY) > 2) {
                        if (currentLine.trim()) {
                            lines.push(currentLine.trim());
                        }
                        currentLine = '';
                    }
                    currentLine += item.str;
                    lastY = item.transform[5];
                });

                // Add the last line
                if (currentLine.trim()) {
                    lines.push(currentLine.trim());
                }

                // Process lines similar to Python logic
                let currentBlock = [];
                
                for (const line of lines) {
                    const trimmedLine = line.trim();
                    
                    // Skip empty lines
                    if (!trimmedLine) {
                        continue;
                    }
                    
                    // Check if this might be a chapter/section header
                    if (trimmedLine.length < 50 && !trimmedLine.endsWith('.')) {
                        // Process accumulated text
                        if (currentBlock.length > 0) {
                            const blockText = currentBlock.join(' ');
                            const sentences = sentTokenize(blockText);
                            processedTextArray.push(...sentences);
                            currentBlock = [];
                        }
                        
                        // Add the header as its own element
                        processedTextArray.push(trimmedLine);
                    } else {
                        currentBlock.push(trimmedLine);
                    }
                }
                
                // Process any remaining text
                if (currentBlock.length > 0) {
                    const blockText = currentBlock.join(' ');
                    const sentences = sentTokenize(blockText);
                    processedTextArray.push(...sentences);
                }
            }

            return processedTextArray;
        }

        // Simple sentence tokenizer (simplified version of NLTK's sent_tokenize)
        function sentTokenize(text) {
            // Basic sentence splitting on common punctuation
            const sentences = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];
            return sentences.map(s => s.trim()).filter(s => s.length > 0);
        }

        // Get best available female voice
        function getFemalVoice() {
            const voices = speechSynthesis.getVoices();
            
            // Priority list of good female voices
            const preferredVoices = [
                'Microsoft Zira - English (United States)',
                'Microsoft Aria Online (Natural) - English (United States)', 
                'Google UK English Female',
                'Google US English Female',
                'Microsoft Natasha Online (Natural) - English (Australia)',
                'Samantha',
                'Victoria',
                'Karen',
                'Moira',
                'Tessa',
                'Fiona'
            ];
            
            // Try to find a preferred voice
            for (const name of preferredVoices) {
                const voice = voices.find(v => v.name.includes(name));
                if (voice) return voice;
            }
            
            // Fallback: find any female voice
            const femaleVoice = voices.find(v => 
                v.name.toLowerCase().includes('female') || 
                v.name.toLowerCase().includes('woman') ||
                v.name.includes('Zira') ||
                v.name.includes('Aria') ||
                v.name.includes('Natasha')
            );
            
            if (femaleVoice) return femaleVoice;
            
            // Last fallback: find any English voice that sounds female
            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            return englishVoices.find(v => 
                !v.name.toLowerCase().includes('male') && 
                !v.name.toLowerCase().includes('david') &&
                !v.name.toLowerCase().includes('mark')
            ) || englishVoices[0] || voices[0];
        }

        // Speak text function (translation of Python function)
        function speakText(text, index) {
            return new Promise((resolve) => {
                speechUtterance = new SpeechSynthesisUtterance(text);
                speechUtterance.rate = parseFloat(rateSlider.value);
                speechUtterance.voice = getFemalVoice();
                speechUtterance.pitch = 1.1; // Slightly higher pitch for more natural female voice
                speechUtterance.volume = 1.0;
                
                speechUtterance.onstart = () => {
                    displayCurrentSentence(index, text);
                    updateProgress(index);
                };
                
                speechUtterance.onend = () => {
                    resolve();
                };
                
                speechUtterance.onerror = () => {
                    resolve();
                };
                
                speechSynthesis.speak(speechUtterance);
            });
        }

        // Main TTS loop (translation of Python main function)
        async function main() {
            isPlaying = true;
            isPaused = false;
            updateButtons();
            
            statusText.textContent = `Speaking: ${processedText.length} sentences`;
            
            for (let i = currentIndex; i < processedText.length; i++) {
                if (!isPlaying) break;
                
                while (isPaused) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                if (!isPlaying) break;
                
                currentIndex = i;
                await speakText(processedText[i], i);
                
                // Small delay between sentences (similar to Python sleep(0.1))
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            if (currentIndex >= processedText.length - 1) {
                stop();
                statusText.textContent = 'Finished reading';
            }
        }

        // UI Helper functions
        function displayCurrentSentence(index, text) {
            textDisplay.innerHTML = `
                <div class="current-sentence">
                    <span class="sentence-number">Sentence ${index + 1} of ${processedText.length}</span>
                    ${text}
                </div>
            `;
        }

        function updateProgress(index) {
            const progress = ((index + 1) / processedText.length) * 100;
            progressFill.style.width = `${progress}%`;
        }

        function updateButtons() {
            if (isPlaying && !isPaused) {
                pauseBtn.innerHTML = '⏸️ Pause';
            } else if (isPaused) {
                pauseBtn.innerHTML = '▶️ Resume';
            } else {
                pauseBtn.innerHTML = '▶️ Play';
            }
        }

        function stop() {
            isPlaying = false;
            isPaused = false;
            currentIndex = 0;
            speechSynthesis.cancel();
            updateButtons();
            
            if (processedText.length > 0) {
                displayCurrentSentence(0, processedText[0]);
            } else {
                textDisplay.innerHTML = `
                    <div class="current-sentence">
                        <span class="sentence-number">Ready to start</span>
                        Click Play to begin reading
                    </div>
                `;
            }
            
            progressFill.style.width = '0%';
            statusText.textContent = 'Stopped';
        }

        // Load voices when they become available
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                // initialize voices cache when available
                void speechSynthesis.getVoices();
            };
        }

        // Event listeners
        async function handleFile(file) {
            if (file && file.type === 'application/pdf') {
                statusText.textContent = 'Processing PDF...';
                currentFileName = file.name;
                
                try {
                    processedText = await processPdfTextWithStructure(file);
                    
                    // Update UI
                    fileName.textContent = currentFileName;
                    sentenceCount.textContent = processedText.length;
                    
                    // Switch views
                    uploadSection.classList.add('hidden');
                    readerSection.classList.add('active');
                    
                    // Display first sentence
                    if (processedText.length > 0) {
                        displayCurrentSentence(0, processedText[0]);
                        statusText.textContent = 'Ready to play';
                        
                        // Auto-start playing
                        setTimeout(() => {
                            main();
                        }, 1000);
                    }
                } catch (error) {
                    console.error('Error processing PDF:', error);
                    statusText.textContent = 'Error processing PDF';
                }
            }
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            await handleFile(file);
        });

        // Drag and drop
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                await handleFile(file);
            }
        });

        // Control buttons - Single pause/play/resume button
        pauseBtn.addEventListener('click', () => {
            if (isPlaying && !isPaused) {
                // Currently playing - pause it
                speechSynthesis.pause();
                isPaused = true;
                statusText.textContent = 'Paused';
            } else if (isPaused) {
                // Currently paused - resume
                speechSynthesis.resume();
                isPaused = false;
                statusText.textContent = `Speaking: ${processedText.length} sentences`;
            } else {
                // Not playing - start playing
                main();
            }
            updateButtons();
        });

        rateSlider.addEventListener('input', (e) => {
            rateValue.textContent = `${e.target.value}x`;
        });

        // Dyslexic font toggle button
        fontToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dyslexic-font');
            fontToggleBtn.classList.toggle('active');
        });
    </script>
</body>
</html>
