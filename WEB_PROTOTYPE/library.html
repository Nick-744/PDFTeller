<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Library - PDF Teller</title>
    <link rel="stylesheet" href="css/your_pdf-index-style.css">
    <link rel="stylesheet" href="css/library-style.css">
</head>
<body>
    <div class="library-container">
        <div class="library-header">
            <div>
                <h1>My Library</h1>
                <p>Saved books and bookmarks you have created.</p>
            </div>
            <div class="actions">
                <a href="your_pdf-index.html" class="open-btn">Add new PDF</a>
                <a href="text2speech-main.html" class="open-btn">Go to TTS</a>
            </div>
        </div>

        <div id="books"></div>

        <hr>
        <h3>Add current processed PDF to library</h3>
        <p>When you process a PDF, a snapshot of the processed data can be saved to your library for later reading.</p>
        <button id="saveCurrentBtn">Save Current PDF to Library</button>
    </div>

    <script src="javascript/library.js"></script>
</body>
</html>
