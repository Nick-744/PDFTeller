<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Teller</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/tts_style.css">
    <link rel="stylesheet" href="css/tts_dyslexic.css">
</head>

<body>
    <!-- Dyslexia Toggle Button -->
    <button id="dyslexiaToggle" class="dyslexia-toggle">
        Dyslexic Friendly Theme
    </button>

    <div class="container">
        <!-- Text Display Section (Top) -->
        <div class="text-section glass">
            <div class="text-header">
                <h2>Currently Reading</h2>
                <span class="block-counter">
                    Block <span id="currentBlock">1</span> of <span id="totalBlocks">0</span>
                </span>
            </div>
            <div class="text-display" id="textDisplay">
                Select a text block to begin reading...
            </div>
        </div>

        <!-- Controls Section (Middle) -->
        <div class="controls-section glass">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- Playback Controls -->
            <div class="playback-controls">
                <button id="prevBtn" class="control-btn" title="Previous">
                    <i class="material-icons">skip_previous</i>
                </button>
                <button id="playBtn" class="control-btn primary" title="Play">
                    <i class="material-icons">play_arrow</i>
                </button>
                <button id="stopBtn" class="control-btn" disabled title="Stop">
                    <i class="material-icons">stop</i>
                </button>
                <button id="nextBtn" class="control-btn" title="Next">
                    <i class="material-icons">skip_next</i>
                </button>
            </div>

            <!-- Voice Settings -->
            <div class="voice-settings">
                <div class="setting-control">
                    <label>Speed</label>
                    <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1.2">
                    <span class="setting-value" id="speedValue">1.2x</span>
                </div>
                <div class="setting-control">
                    <label>Volume</label>
                    <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="1">
                    <span class="setting-value" id="volumeValue">100%</span>
                </div>
                <div class="setting-control">
                    <label>Voice</label>
                    <select id="voiceSelect">
                        <option>Loading voices...</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- PDF Info Section (Bottom) -->
        <div class="pdf-section glass">
            <div class="pdf-info">
                <div class="pdf-details">
                    <span class="pdf-icon">📄</span>
                    <div>
                        <div class="pdf-name" id="pdfName">No PDF loaded</div>
                        <div class="pdf-stats" id="pdfStats">0 text blocks</div>
                    </div>
                </div>
                <div>
                    <button class="upload-btn" onclick="window.location.href='your_pdf-index.html'">
                        Upload New PDF
                    </button>
                    <button class="upload-btn" style="background: linear-gradient(135deg,#6f42c1,#20c997); margin-left:12px;" onclick="window.location.href='library.html'">
                        Open Library
                    </button>
                    <button id="addToLibraryBtn" class="open-btn" style="margin-left:12px; display:none;">Add to Library</button>
                    <button id="saveBookmarkBtn" class="open-btn" style="margin-left:8px; display:none;">Save Bookmark</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="overlay hidden" id="loadingOverlay">
        <div class="overlay-content">
            <div class="spinner"></div>
            <p style="font-size: 1.1rem; color: #495057;">Loading PDF data...</p>
        </div>
    </div>

    <!-- Error Overlay -->
    <div class="overlay hidden" id="errorOverlay">
        <div class="overlay-content">
            <h3 style="color: #dc3545; margin-bottom: 15px; font-size: 1.5rem;">No PDF Data Found!</h3>
            <p style="color: #6c757d; margin-bottom: 20px;">Please upload a PDF file first.</p>
            <button class="upload-btn" onclick="window.location.href='your_pdf-index.html'">
                Go to Upload
            </button>
        </div>
    </div>

    <script src="javascript/library_api.js"></script>
    <script src="javascript/tts-core.js"></script>
    <script src="javascript/tts-page.js"></script>
</body>
</html>
